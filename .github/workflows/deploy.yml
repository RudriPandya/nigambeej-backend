name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.BACKEND_PATH }}

            echo "==> Backing up uploads..."
            if [ -d "uploads" ] && [ "$(ls -A uploads 2>/dev/null)" ]; then
              cp -r uploads /tmp/uploads_backup_deploy
            fi

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing dependencies..."
            npm ci --omit=dev

            echo "==> Building..."
            npm run build

            echo "==> Restoring uploads..."
            mkdir -p uploads
            if [ -d "/tmp/uploads_backup_deploy" ]; then
              cp -rn /tmp/uploads_backup_deploy/. uploads/
              rm -rf /tmp/uploads_backup_deploy
            fi

            echo "==> Restarting app..."
            pm2 restart ${{ secrets.PM2_APP_NAME }} || pm2 start dist/main.js --name ${{ secrets.PM2_APP_NAME }}

            echo "==> Deploy complete."
